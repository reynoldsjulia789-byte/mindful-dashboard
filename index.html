<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- Compiled CSS file -->
     <link rel="stylesheet" href="/src/style.css">

    <!-- Transpiled JS -->
    <script src="/src/script.js" type="module" defer></script>

  </head>

<body class="min-h-screen flex justify-center items-center bg-[url(/src/img/dragon.jpg)] bg-cover font-serif text-2xl font-bold text-amber-200">

    <main class="w-[90%] max-w-7xl grid grid-cols-3 gap-4">

        <section class="bg-black/50 backdrop-blur-xs rounded-2xl p-4 flex flex-col items-center justify-center row-span-2" role="region" aria-label="Days until event">
          <p>Days until Graduation</p>
          <p class="text-md p-3">
            <time class="daysUntilEvent text-6xl">
              000
            </time>
            days
          </p>
        </section>

        <section class="bg-black/50 rounded-2xl p-4 flex flex-col items-center backdrop-blur-xs" role="region" aria-label="Date">
          <time class="date text-3xl">
            <span class="dayOfWeek">Day</span>
          </time>
          <time class="date text-lg">
            <span class="month">Month</span>
            <span class="dayOfMonth">DD</span>,
            <span class="year">YYYY</span>
          </time>
          <time class="time text-6xl p-4">
            <span class="hours">HH</span>:<span class="minutes">MM</span>
            <!-- :<span class="seconds">SS</span> -->
            <!-- <span class="amOrPm">AM/PM</span> -->
          </time>
        </section>        

        <section class="bg-black/50 backdrop-blur-xs rounded-2xl p-4 flex flex-col items-center justify-center row-span-2" role="region" aria-label="Streak">
          <p>Days studying CS</p>
          <p class="text-md p-3"><time class="streakOfDays text-5xl">000</time> days</p>
        </section>

        <section class="bg-black/50 backdrop-blur-xs rounded-2xl p-4 flex flex-col items-center justify-center" role="region" aria-label="Age">
          <p class="text-md"><time class="ageOfPerson text-5xl">000</time> years playing music</p>
        </section>

    </main>
    
  </body>
</html>
